<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Supply Chain — Interactive Flow Diagram v3</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Arial', sans-serif; background: #0f1923; color: #e8e8e6; height: 100vh; overflow: hidden; }

#hdr { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: #0f1923; border-bottom: 1px solid #1e3448; display: flex; align-items: center; padding: 0 20px; gap: 12px; z-index: 200; flex-wrap: wrap; }
#hdr h1 { font-size: 13px; font-weight: bold; color: #7ec8f4; white-space: nowrap; }
#hdr .sub { font-size: 10px; color: #4a6a8a; white-space: nowrap; }
.tl { font-size: 9px; font-weight: bold; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.tl-si { background:#1a3a5c; color:#7ec8f4; }
.tl-dc { background:#0a2a1a; color:#7ef4b8; }
.tl-pw { background:#3a1a0a; color:#f4a85c; }
.tl-df { background:#2a1a3a; color:#c47ef4; }
#hdr .hint { font-size: 10px; color: #3a5a7a; margin-left: auto; white-space: nowrap; }

#legend { position: fixed; bottom: 10px; left: 10px; z-index: 100; background: rgba(15,25,35,0.95); border: 1px solid #1e3448; border-radius: 8px; padding: 8px 12px; font-size: 10px; }
.leg-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.leg-row:last-child { margin-bottom: 0; }
.lc { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

#tooltip { position: fixed; z-index: 200; background: rgba(20,40,70,0.97); color: #fff; border-radius: 6px; padding: 8px 12px; font-size: 11px; pointer-events: none; display: none; max-width: 240px; line-height: 1.5; border: 1px solid #2e4a68; }
#tooltip .tt-ticker { font-size: 14px; font-weight: bold; margin-bottom: 2px; }
#tooltip .tt-name   { font-size: 11px; opacity: 0.8; margin-bottom: 4px; }
#tooltip .tt-row    { display: flex; justify-content: space-between; gap: 12px; font-size: 10px; }
#tooltip .tt-insight{ font-size: 10px; opacity: 0.75; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 4px; line-height: 1.4; }

#wrap { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
#wrap.grabbing { cursor: grabbing; }
#scene { position: absolute; transform-origin: 0 0; }

.tnode { position: absolute; width: 130px; cursor: pointer; transition: transform 0.15s; }
.tnode:hover .tbox { border-color: #7ec8f4; box-shadow: 0 0 20px rgba(126,200,244,0.25); }
.tnode:hover { transform: scale(1.05); z-index: 10; }
.tnode.active .tbox { border-color: #7ec8f4; box-shadow: 0 0 24px rgba(126,200,244,0.4); }
.tbox { background: #131f2e; border: 1.5px solid #1e3a54; border-radius: 12px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
.tbox-img { width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; }
.tbox-body { padding: 8px 10px 10px; }
.tbox-tid { font-size: 9px; font-weight: bold; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
.tbox-name { font-size: 11px; font-weight: bold; color: #e8e8e6; line-height: 1.3; }
.tbox-count { font-size: 9px; color: #4a6a8a; margin-top: 3px; }

.satnode { position: absolute; width: 100px; cursor: pointer; transition: transform 0.15s; }
.satnode:hover .satbox { border-color: #f4a85c; }
.satnode:hover { transform: scale(1.06); z-index: 10; }
.satnode.active .satbox { border-color: #f4a85c; }
.satbox { background: #1a1508; border: 1.5px solid #3a2a0a; border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
.satbox-img { width: 100%; height: 56px; display: flex; align-items: center; justify-content: center; }
.satbox-body { padding: 5px 8px 7px; }
.satbox-tid { font-size: 8px; font-weight: bold; letter-spacing: 0.07em; text-transform: uppercase; color: #f4a85c; margin-bottom: 1px; }
.satbox-name { font-size: 10px; font-weight: bold; color: #e8c88a; line-height: 1.2; }
.satbox-count { font-size: 8px; color: #5a4a2a; margin-top: 2px; }

svg#arrows { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }

#panel { position: fixed; top: 48px; right: 0; bottom: 0; width: 320px; background: #0d1720; border-left: 1px solid #1e3448; transform: translateX(100%); transition: transform 0.3s ease; z-index: 150; display: flex; flex-direction: column; }
#panel.open { transform: translateX(0); }
#panel-hdr { padding: 16px 18px 12px; border-bottom: 1px solid #1e3448; flex-shrink: 0; }
#panel-tid { font-size: 10px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
#panel-name { font-size: 15px; font-weight: bold; color: #e8e8e6; margin-bottom: 4px; }
#panel-desc { font-size: 11px; color: #5a7a9a; line-height: 1.5; }
#panel-close { position: absolute; top: 14px; right: 14px; width: 24px; height: 24px; background: #1e3448; border: none; color: #7ec8f4; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
#panel-close:hover { background: #2e4a68; }
#panel-list { flex: 1; overflow-y: auto; padding: 10px 0; }
#panel-list::-webkit-scrollbar { width: 4px; }
#panel-list::-webkit-scrollbar-thumb { background: #1e3448; border-radius: 2px; }
.co-row { display: flex; align-items: center; gap: 10px; padding: 8px 18px; border-bottom: 1px solid #0f1923; transition: background 0.1s; }
.co-row:hover { background: #131f2e; }
.co-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.co-ticker { font-size: 12px; font-weight: bold; color: #e8e8e6; min-width: 58px; }
.co-name { font-size: 11px; color: #5a7a9a; flex: 1; }
.co-star { font-size: 10px; color: #BA7517; }
.co-priv { font-size: 9px; color: #3a5a4a; padding: 1px 5px; border: 1px dashed #2a4a3a; border-radius: 10px; }
.co-new  { font-size: 9px; color: #0F6E56; padding: 1px 5px; border: 1px solid #0F6E56; border-radius: 10px; }
.panel-leg { padding: 10px 18px; border-top: 1px solid #1e3448; display: flex; flex-wrap: wrap; gap: 8px; flex-shrink: 0; }
.pl { display: flex; align-items: center; gap: 4px; font-size: 9px; color: #4a6a8a; }
.pl-dot { width: 8px; height: 8px; border-radius: 2px; }
</style>
</head>
<body>

<div id="hdr">
  <h1>AI Supply Chain — Flow Diagram v3</h1>
  <span class="sub">Click any tier · Scroll to zoom · Drag to pan</span>
  <span class="tl tl-si">Silicon track →</span>
  <span class="tl tl-dc">Data center hub</span>
  <span class="tl tl-pw">← Power &amp; grid</span>
  <span class="tl tl-df">Defense</span>
  <span class="hint">Apr 2026 · FactSet</span>
</div>

<div id="legend">
  <div class="leg-row"><div class="lc" style="background:#C0DD97"></div>&lt;15x</div>
  <div class="leg-row"><div class="lc" style="background:#FAC775"></div>15–25x</div>
  <div class="leg-row"><div class="lc" style="background:#F09595"></div>25–35x</div>
  <div class="leg-row"><div class="lc" style="background:#E24B4A"></div>&gt;35x</div>
  <div class="leg-row"><div class="lc" style="background:#4a4a48"></div>N/M</div>
  <div class="leg-row"><span style="color:#BA7517;font-size:12px">★</span>&nbsp;Pivotal</div>
</div>

<div id="tooltip">
  <div class="tt-ticker" id="tt-ticker"></div>
  <div class="tt-name"   id="tt-name"></div>
  <div class="tt-row"><span>Mkt Cap</span><span id="tt-mkt" style="font-weight:bold"></span></div>
  <div class="tt-row"><span>EV/EBITDA</span><span id="tt-ev" style="font-weight:bold"></span></div>
  <div class="tt-insight" id="tt-insight"></div>
</div>

<div id="wrap">
  <div id="scene"><svg id="arrows"></svg></div>
</div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-hdr">
    <div id="panel-tid"></div>
    <div id="panel-name"></div>
    <div id="panel-desc"></div>
  </div>
  <div id="panel-list"></div>
  <div class="panel-leg">
    <div class="pl"><div class="pl-dot" style="background:#C0DD97"></div>&lt;15x</div>
    <div class="pl"><div class="pl-dot" style="background:#FAC775"></div>15–25x</div>
    <div class="pl"><div class="pl-dot" style="background:#F09595"></div>25–35x</div>
    <div class="pl"><div class="pl-dot" style="background:#E24B4A"></div>&gt;35x</div>
    <div class="pl"><div class="pl-dot" style="background:#4a4a48"></div>N/M</div>
    <div class="pl"><span style="color:#BA7517">★</span>&nbsp;Pivotal</div>
    <div class="pl"><span style="color:#0F6E56;font-size:9px">◆</span>&nbsp;New v5</div>
  </div>
</div>

// ── LAYOUT ────────────────────────────────────────────────────────────────
const NW=130, NH=148, NSW=100, NSH=112;
const SI_Y=20, PW_Y=500, DC_X=1080, DC_Y1=140, DC_Y2=300;
const SI_XS=[20,168,316,464,612,760];
const PW_XS=[860,706,552,398,244,90];
const SAT_Y=PW_Y+160, SAT_XS=[666,780,894];
const T15_X=1220, T15_Y=200;

const pos={
  T1:{x:SI_XS[0],y:SI_Y,w:NW,h:NH},
  T2:{x:SI_XS[1],y:SI_Y,w:NW,h:NH},
  T3:{x:SI_XS[2],y:SI_Y,w:NW,h:NH},
  T4:{x:SI_XS[3],y:SI_Y,w:NW,h:NH},
  T5:{x:SI_XS[4],y:SI_Y,w:NW,h:NH},
  T6:{x:SI_XS[5],y:SI_Y,w:NW,h:NH},
  T7:{x:DC_X,y:DC_Y1,w:NW,h:NH},
  T8:{x:DC_X,y:DC_Y2,w:NW,h:NH},
  T9:{x:PW_XS[0],y:PW_Y,w:NW,h:NH},
  T10a:{x:PW_XS[1],y:PW_Y,w:NW,h:NH},
  T10b:{x:SAT_XS[0],y:SAT_Y,w:NSW,h:NSH},
  T10c:{x:SAT_XS[1],y:SAT_Y,w:NSW,h:NSH},
  T10d:{x:SAT_XS[2],y:SAT_Y,w:NSW,h:NSH},
  T11:{x:PW_XS[2],y:PW_Y,w:NW,h:NH},
  T12:{x:PW_XS[3],y:PW_Y,w:NW,h:NH},
  T13:{x:PW_XS[4],y:PW_Y,w:NW,h:NH},
  T14:{x:PW_XS[5],y:PW_Y,w:NW,h:NH},
  T15:{x:T15_X,y:T15_Y,w:NW,h:NH},
};

const SCENE_W=1420, SCENE_H=780;

function midX(p){return p.x+p.w/2;}
function midY(p){return p.y+p.h/2;}
function rightX(p){return p.x+p.w;}
function botY(p){return p.y+p.h;}
function topY(p){return p.y;}

function evColor(ev,priv){
  if(priv) return{bg:'#1e2e1e',text:'#4a7a5a',border:'#2a4a2a'};
  if(ev===null) return{bg:'#2a2a28',text:'#7a7a78',border:'#3a3a38'};
  if(ev<15)  return{bg:'#1a2e0a',text:'#8ecf5a',border:'#3a5a1a'};
  if(ev<25)  return{bg:'#2e1e04',text:'#e8a840',border:'#5a3a08'};
  if(ev<35)  return{bg:'#2e0a0a',text:'#e88080',border:'#5a1a1a'};
  return{bg:'#5a0808',text:'#ffaaaa',border:'#8a1010'};
}

function fmtMkt(m){
  if(!m)return'—';
  if(m>=1000000)return'$'+(m/1000000).toFixed(1)+'T';
  if(m>=1000)return'$'+Math.round(m/1000)+'B';
  return'$'+m+'M';
}
function fmtEv(ev,priv){
  if(priv)return'Private';
  if(ev===null)return'N/M';
  return ev.toFixed(1)+'x';
}
function evDot(ev,priv){
  if(priv)return'#2a4a3a';
  if(ev===null)return'#4a4a48';
  if(ev<15)return'#C0DD97';
  if(ev<25)return'#FAC775';
  if(ev<35)return'#F09595';
  return'#E24B4A';
}

const scene=document.getElementById('scene');
scene.style.width=SCENE_W+'px';
scene.style.height=SCENE_H+'px';

const svg=document.getElementById('arrows');
svg.setAttribute('width',SCENE_W);
svg.setAttribute('height',SCENE_H);

// ── ARROWS ────────────────────────────────────────────────────────────────
const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
defs.innerHTML=`
  <marker id="a"  markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,6 2,0 4" fill="#4a6a8a" opacity="0.7"/></marker>
  <marker id="ag" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,6 2,0 4" fill="#7ef4b8" opacity="0.7"/></marker>
  <marker id="ap" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,6 2,0 4" fill="#c47ef4" opacity="0.7"/></marker>`;
svg.appendChild(defs);

function line(x1,y1,x2,y2,col,dash,w,mid){
  const el=document.createElementNS('http://www.w3.org/2000/svg','line');
  el.setAttribute('x1',x1);el.setAttribute('y1',y1);el.setAttribute('x2',x2);el.setAttribute('y2',y2);
  el.setAttribute('stroke',col);el.setAttribute('stroke-width',w||1.5);el.setAttribute('stroke-opacity','0.4');
  if(dash)el.setAttribute('stroke-dasharray','5,4');
  el.setAttribute('marker-end','url(#a)');
  svg.appendChild(el);
}
function crv(x1,y1,x2,y2,cx1,cy1,cx2,cy2,col,dash,mid){
  const el=document.createElementNS('http://www.w3.org/2000/svg','path');
  el.setAttribute('d',`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`);
  el.setAttribute('fill','none');el.setAttribute('stroke',col);
  el.setAttribute('stroke-width','1.5');el.setAttribute('stroke-opacity','0.38');
  if(dash)el.setAttribute('stroke-dasharray','5,4');
  el.setAttribute('marker-end','url(#'+(col==='#7ef4b8'?'ag':col==='#c47ef4'?'ap':'a')+')');
  svg.appendChild(el);
}

// Silicon track
['T1','T2','T3','T4','T5'].forEach((id,i)=>{
  const b=['T2','T3','T4','T5','T6'][i];
  line(rightX(pos[id]),midY(pos[id]),pos[b].x,midY(pos[b]),'#7ec8f4',false,1.8);
});
// T6 → T7 curve down into DC hub
crv(midX(pos.T6),botY(pos.T6),midX(pos.T7),topY(pos.T7),midX(pos.T6),botY(pos.T6)+70,midX(pos.T7),topY(pos.T7)-40,'#7ef4b8',false);
// T7 → T8
line(midX(pos.T7),botY(pos.T7),midX(pos.T8),topY(pos.T8),'#7ef4b8',false,1.8);
// T8 → T9 curve to power track
crv(pos.T8.x,midY(pos.T8),rightX(pos.T9),midY(pos.T9),pos.T8.x-50,midY(pos.T8),rightX(pos.T9)+50,midY(pos.T9),'#f4a85c',false);
// Power track right to left
[['T9','T10a'],['T10a','T11'],['T11','T12'],['T12','T13'],['T13','T14']].forEach(([a,b])=>{
  line(pos[a].x,midY(pos[a]),rightX(pos[b]),midY(pos[b]),'#f4a85c',false,1.8);
});
// T10a → satellites
['T10b','T10c','T10d'].forEach(sid=>{
  crv(midX(pos.T10a),botY(pos.T10a),midX(pos[sid]),topY(pos[sid]),midX(pos.T10a),botY(pos.T10a)+35,midX(pos[sid]),topY(pos[sid])-35,'#f4a85c',true);
});
// T15 defense dashed purple
crv(pos.T15.x,midY(pos.T15),rightX(pos.T10a),midY(pos.T10a),pos.T15.x-50,midY(pos.T15)-30,rightX(pos.T10a)+60,midY(pos.T10a)-30,'#c47ef4',true);
crv(pos.T15.x,midY(pos.T15)+20,midX(pos.T11),topY(pos.T11),pos.T15.x-30,midY(pos.T15)+70,midX(pos.T11)+50,topY(pos.T11)-30,'#c47ef4',true);
// T8 → T11 dashed green
crv(midX(pos.T8),botY(pos.T8),rightX(pos.T11),midY(pos.T11),midX(pos.T8)+100,botY(pos.T8)+90,rightX(pos.T11)+70,midY(pos.T11)-60,'#7ef4b8',true);

// Track labels
function trackLbl(txt,x,y,color,bg){
  const d=document.createElement('div');
  d.style.cssText=`position:absolute;left:${x}px;top:${y}px;font-size:8px;font-weight:bold;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:10px;color:${color};background:${bg};pointer-events:none;`;
  d.textContent=txt;
  scene.appendChild(d);
}
trackLbl('← Silicon track',14,4,'#7ec8f4','#1a3a5c33');
trackLbl('Power & grid track →',14,468,'#f4a85c','#3a1a0a33');

// ── BUILD NODES ───────────────────────────────────────────────────────────
const nodeEls={};

tiers.forEach(tier=>{
  const p=pos[tier.id]; if(!p) return;
  const isSat=!!tier.sat;
  const div=document.createElement('div');
  div.className=isSat?'satnode':'tnode';
  div.id='node_'+tier.id;
  div.style.left=p.x+'px';
  div.style.top=p.y+'px';
  div.style.width=p.w+'px';
  div.onclick=()=>openPanel(tier.id);

  const pub=tier.companies.filter(c=>!c.priv).length;
  const prv=tier.companies.filter(c=>c.priv).length;
  const imgH=isSat?56:80;
  const bp=isSat?'satbox':'tbox';

  div.innerHTML=`
    <div class="${bp}" style="background:${tier.accent}22;border-color:${tier.color}44;">
      <div class="${bp}-img" style="height:${imgH}px;background:${tier.accent}18;">${svgs[tier.img]||''}</div>
      <div class="${bp}-body">
        <div class="${bp}-tid" style="color:${tier.color}">${tier.id}</div>
        <div class="${bp}-name">${tier.name}</div>
        <div class="${bp}-count">${pub} public${prv>0?' · '+prv+' private':''}</div>
      </div>
    </div>`;

  scene.appendChild(div);
  nodeEls[tier.id]=div;
});

// ── PANEL ─────────────────────────────────────────────────────────────────
let activeId=null;

function openPanel(id){
  if(activeId===id){closePanel();return;}
  if(activeId)document.getElementById('node_'+activeId)?.classList.remove('active');
  activeId=id;
  document.getElementById('node_'+id)?.classList.add('active');
  const tier=tiers.find(t=>t.id===id);
  if(!tier)return;
  document.getElementById('panel-tid').textContent=tier.id;
  document.getElementById('panel-tid').style.color=tier.color;
  document.getElementById('panel-name').textContent=tier.fullName;
  document.getElementById('panel-desc').textContent=tier.desc;
  const list=document.getElementById('panel-list');
  list.innerHTML='';
  tier.companies.forEach(co=>{
    const row=document.createElement('div');
    row.className='co-row';
    row.innerHTML=`
      <div class="co-dot" style="background:${evDot(co.ev,co.priv)}"></div>
      <span class="co-ticker">${co.t}</span>
      <span class="co-name">${co.n}</span>
      ${co.star?'<span class="co-star">★</span>':''}
      ${co.priv?'<span class="co-priv">Private</span>':''}
      ${co.isnew?'<span class="co-new">◆ New</span>':''}`;
    list.appendChild(row);
  });
  document.getElementById('panel').classList.add('open');
}

function closePanel(){
  if(activeId)document.getElementById('node_'+activeId)?.classList.remove('active');
  activeId=null;
  document.getElementById('panel').classList.remove('open');
}

// ── PAN & ZOOM ────────────────────────────────────────────────────────────
const wrap=document.getElementById('wrap');
let scale=0.78, tx=10, ty=10;
let dragging=false, lx=0, ly=0;

function applyT(){scene.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;}
applyT();

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=wrap.getBoundingClientRect();
  const mx2=e.clientX-r.left,my2=e.clientY-r.top;
  const d=e.deltaY>0?0.88:1.14;
  const ns=Math.min(2.5,Math.max(0.2,scale*d));
  tx=mx2-(mx2-tx)*(ns/scale);ty=my2-(my2-ty)*(ns/scale);scale=ns;applyT();
},{passive:false});

wrap.addEventListener('mousedown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;wrap.classList.add('grabbing');});
window.addEventListener('mousemove',e=>{if(!dragging)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;applyT();});
window.addEventListener('mouseup',()=>{dragging=false;wrap.classList.remove('grabbing');});
wrap.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}},{passive:true});
wrap.addEventListener('touchmove',e=>{if(dragging&&e.touches.length===1){tx+=e.touches[0].clientX-lx;ty+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;applyT();}},{passive:true});
wrap.addEventListener('touchend',()=>{dragging=false;});
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')tx+=20;if(e.key==='ArrowRight')tx-=20;
  if(e.key==='ArrowUp')ty+=20;if(e.key==='ArrowDown')ty-=20;
  if(e.key==='Escape')closePanel();
  applyT();
});
</script>
